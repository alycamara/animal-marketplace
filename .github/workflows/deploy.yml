name: Deploy to Elastic Beanstalk  # Nom du workflow, visible dans l'interface GitHub Actions

on:
  push:
    branches:
      - features  # Le workflow se déclenche uniquement lorsqu'un push est effectué sur la branche "features"

jobs:
  deploy: # Nom du job, ici "deploy"
    runs-on: ubuntu-latest  # Le job s'exécute sur une machine virtuelle Ubuntu avec la dernière version disponible

    steps:
      - name: Checkout code  # Étape 1 : Récupération du code source
        uses: actions/checkout@v3

      - name: Set up JDK 17  # Étape 2 : Configuration de l'environnement Java
        uses: actions/setup-java@v2
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven dependencies  # Étape 3 : Mise en cache des dépendances Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2

      - name: Build project  # Étape 4 : Compilation du projet avec Maven
        run: mvn clean package -DskipTests

      - name: Archive project  # Étape 5 : Création de l'archive ZIP
        run: zip -r application.zip . -x ".git/*" "target/*" ".github/*"

      - name: Create S3 bucket if it does not exist  # Étape 6 : Création du bucket S3 si nécessaire
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          aws s3api create-bucket \
            --bucket elasticbeanstalk-${{ secrets.AWS_REGION }}-app-bucket \
            --region $AWS_REGION \
            --create-bucket-configuration LocationConstraint=$AWS_REGION || true

      - name: Upload to S3  # Étape 7 : Téléchargement de l'archive dans S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          aws s3 cp application.zip s3://elasticbeanstalk-${{ secrets.AWS_REGION }}-app-bucket/application.zip

      - name: Create Elastic Beanstalk application if it does not exist  # Étape 8 : Création de l'application Elastic Beanstalk
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          if ! aws elasticbeanstalk describe-applications --application-names "animalMarketplace" > /dev/null 2>&1; then
            echo "Creating Elastic Beanstalk application 'animalMarketplace'..."
            aws elasticbeanstalk create-application --application-name "animalMarketplace"
          else
            echo "Elastic Beanstalk application 'animalMarketplace' already exists."
          fi

      - name: Verify application exists before creating version  # Étape 9 : Vérification de l'existence de l'application
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          if ! aws elasticbeanstalk describe-applications --application-names "animalMarketplace" > /dev/null 2>&1; then
            echo "Error: Application 'animalMarketplace' does not exist. Exiting."
            exit 1
          fi
      - name: Debug Elastic Beanstalk applications  # Étape de débogage pour lister les applications existantes
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          echo "Listing existing Elastic Beanstalk applications..."
          aws elasticbeanstalk describe-applications


      - name: Deploy to Elastic Beanstalk  # Étape 10 : Déploiement sur AWS Elastic Beanstalk
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name "animalMarketplace" \
            --version-label "${{ github.sha }}" \
            --source-bundle S3Bucket="elasticbeanstalk-${{ secrets.AWS_REGION }}-app-bucket",S3Key="application.zip" \
            --region $AWS_REGION
          aws elasticbeanstalk update-environment \
            --application-name "animalMarketplace" \
            --environment-name "animalMarketplace-env" \
            --version-label "${{ github.sha }}" \
            --region $AWS_REGION