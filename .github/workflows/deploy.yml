name: Deploy to Elastic Beanstalk  # Nom du workflow, visible dans l'interface GitHub Actions

on:
  push:
    branches:
      - features  # Le workflow se déclenche uniquement lorsqu'un push est effectué sur la branche "features"

jobs:
  deploy:  # Nom du job, ici "deploy"
    runs-on: ubuntu-latest  # Le job s'exécute sur une machine virtuelle Ubuntu avec la dernière version disponible

    steps:
      - name: Checkout code  # Étape 1 : Récupération du code source
        uses: actions/checkout@v3  # Mise à jour vers la version 3 de l'action officielle

      - name: Set up JDK 17  # Étape 2 : Configuration de l'environnement Java
        uses: actions/setup-java@v2  # Utilisation de l'action officielle pour configurer Java
        with:
          java-version: '17'  # Spécifie la version de Java à utiliser (ici Java 17)
          distribution: 'temurin'  # Distribution de JDK utilisée (Temurin, une distribution OpenJDK)

      - name: Cache Maven dependencies  # Étape 3 : Mise en cache des dépendances Maven
        uses: actions/cache@v4  # Utilisation de la version 4 de l'action cache
        with:
          path: ~/.m2  # Chemin du répertoire Maven local à mettre en cache
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}  # Clé unique basée sur le système d'exploitation et le hash du fichier `pom.xml`
          restore-keys: |
            ${{ runner.os }}-m2  # Clé de secours pour restaurer un cache partiel si la clé principale n'est pas trouvée

      - name: Build project  # Étape 4 : Compilation du projet avec Maven
        run: mvn clean package -DskipTests  # Compile le projet et génère un fichier JAR sans exécuter les tests

      - name: Archive project  # Étape 5 : Création de l'archive ZIP
        run: zip -r application.zip . -x ".git/*" "target/*" ".github/*"  # Archive le projet dans un fichier ZIP

      - name: Create S3 bucket if it does not exist  # Étape 6 : Création du bucket S3 si nécessaire
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          aws s3api create-bucket \
            --bucket elasticbeanstalk-${{ secrets.AWS_REGION }}-app-bucket \
            --region $AWS_REGION \
            --create-bucket-configuration LocationConstraint=$AWS_REGION || true

      - name: Upload to S3  # Étape 7 : Telechargement de l'archive dans S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          aws s3 cp application.zip s3://elasticbeanstalk-${{ secrets.AWS_REGION }}-app-bucket/application.zip

      - name: Create Elastic Beanstalk application if it does not exist  # Vérifie et crée l'application si nécessaire
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          if ! aws elasticbeanstalk describe-applications --application-names "animal-marketplace" > /dev/null 2>&1; then
            echo "Creating Elastic Beanstalk application 'animal-marketplace'..."
            aws elasticbeanstalk create-application --application-name "animal-marketplace"
          else
            echo "Elastic Beanstalk application 'animal-marketplace' already exists."
          fi

      - name: Debug Elastic Beanstalk applications  # Étape de débogage pour lister les applications existantes
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          echo "Listing existing Elastic Beanstalk applications..."
          aws elasticbeanstalk describe-applications

      - name: Deploy to Elastic Beanstalk  # Étape 9 : Déploiement sur AWS Elastic Beanstalk
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name "animal-marketplace" \
            --version-label "${{ github.sha }}" \
            --source-bundle S3Bucket="elasticbeanstalk-${{ secrets.AWS_REGION }}-app-bucket",S3Key="application.zip" \
            --region $AWS_REGION
          aws elasticbeanstalk update-environment \
            --application-name "animal-marketplace" \
            --environment-name "animal-marketplace-env" \
            --version-label "${{ github.sha }}" \
            --region $AWS_REGION